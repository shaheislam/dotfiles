# Kubie Configuration
# Managed via dotfiles and symlinked to ~/.kube/kubie.yaml

# Disable kubie's prompt modification - let starship handle Kubernetes context/namespace display
prompt:
  disable: true

# Shell behavior configuration
behavior:
  # Spawn a new shell when switching contexts (default)
  spawn_shell: true
  # Use Fish shell for kubie contexts
  shell: fish

# Optional: Configure namespace behavior
# namespace:
#   # Show all namespaces by default
#   show_all: true
