# Codex CLI Configuration
# Managed by dotfiles (stow). Auth/sessions are machine-specific and gitignored.
#
# Usage:
#   codex                        # Interactive with defaults
#   codex -p auto "Fix bug"     # Full-auto profile
#   codex -p safe "Review code" # Read-only sandbox
#   codex -p local "Explain"    # Local Ollama model
#
# Override inline:
#   codex -c model="o3" "prompt"
#   codex -c 'sandbox_permissions=["disk-full-read-access"]' "prompt"

model = "gpt-5.5"
approval_policy = "never"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
service_tier = "fast"
web_search = "cached"
personality = "pragmatic"
sandbox_mode = "workspace-write"

[history]
persistence = "save-all"

[tui]
status_line = ["model-name", "context-remaining", "used-tokens", "git-branch", "session-id"]
show_tooltips = false
notifications = true

[features]
undo = true
prevent_idle_sleep = true
multi_agent = true

[shell_environment_policy]
inherit = "all"

# --- Profiles ---

[profiles.auto]
# Full autonomous mode: sandboxed workspace writes, no approval prompts
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
service_tier = "fast"

[profiles.safe]
# Read-only: safe for exploration and review tasks
approval_policy = "untrusted"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.fast]
# Quick tasks with lower reasoning overhead
model = "gpt-4.1"
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"

[profiles.local]
# Local Ollama model (requires ollama serve running)
model_provider = "ollama-local"
model = "qwen3-coder"
approval_policy = "on-failure"
sandbox_mode = "workspace-write"

# --- Model Providers ---

[model_providers.ollama-local]
name = "Ollama (local)"
base_url = "http://localhost:11434/v1"
env_key = "OLLAMA_API_KEY"
wire_api = "responses"

[projects."~/dotfiles"]
trust_level = "trusted"

[projects."~/neovim"]
trust_level = "trusted"

[projects."~/dotfiles-tokyo"]
trust_level = "trusted"

[projects."/Users/shaheislam/dotfiles"]
trust_level = "trusted"

[mcp_servers.playwright]
command = "bunx"
args = ["@playwright/mcp@latest"]

[mcp_servers.steampipe]
command = "bunx"
args = ["-y", "@turbot/steampipe-mcp", "postgresql://steampipe@localhost:9193/steampipe"]

[mcp_servers.context7]
command = "bunx"
args = ["@upstash/context7-mcp"]

[mcp_servers.drawio]
command = "bunx"
args = ["-y", "drawio-mcp-server"]

[mcp_servers.claudecodebrowser]
command = "python3"
args = ["~/.claudecodebrowser/mcp-server/stdio_wrapper.py"]

[notice]
hide_rate_limit_model_nudge = true

[sandbox_workspace_write]
network_access = true

[marketplaces.openai-bundled]
last_updated = "2026-05-19T17:16:27Z"
source_type = "local"
source = "~/dotfiles/.codex/.tmp/bundled-marketplaces/openai-bundled"

