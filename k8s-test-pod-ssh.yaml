apiVersion: v1
kind: Pod
metadata:
  name: dev-pod-ssh
  namespace: default
  labels:
    app: dev-pod
    environment: development
spec:
  containers:
  - name: dev-container
    image: ubuntu:22.04
    command: ["/bin/bash"]
    args: ["-c", "apt-get update && apt-get install -y openssh-server vim curl wget git && mkdir -p /var/run/sshd && echo 'root:devpassword' | chpasswd && sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && ssh-keygen -A && /usr/sbin/sshd -D"]
    ports:
    - containerPort: 22
      name: ssh
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
---
apiVersion: v1
kind: Pod
metadata:
  name: dev-pod-alpine
  namespace: default
  labels:
    app: dev-pod
    environment: development
spec:
  containers:
  - name: alpine-container
    image: alpine:latest
    command: ["/bin/sh"]
    args: ["-c", "apk add --no-cache openssh bash vim curl wget git && ssh-keygen -A && echo 'root:devpassword' | chpasswd && sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && mkdir -p /var/run/sshd && /usr/sbin/sshd -D"]
    ports:
    - containerPort: 22
      name: ssh
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
---
apiVersion: v1
kind: Pod
metadata:
  name: dev-pod-python
  namespace: default
  labels:
    app: dev-pod
    environment: development
spec:
  containers:
  - name: python-container
    image: python:3.11-slim
    command: ["/bin/bash"]
    args: ["-c", "apt-get update && apt-get install -y openssh-server vim curl wget git && mkdir -p /var/run/sshd && echo 'root:devpassword' | chpasswd && sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && ssh-keygen -A && pip install ipython jupyter && /usr/sbin/sshd -D"]
    ports:
    - containerPort: 22
      name: ssh
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    volumeMounts:
    - name: code
      mountPath: /workspace
  volumes:
  - name: code
    emptyDir: {}