# Yazi Configuration
# https://yazi-rs.github.io/docs/configuration/yazi

[mgr]
# Layout ratio: parent : current : preview
ratio = [1, 4, 3]

# Sorting
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false

# Display
show_hidden = true
show_symlink = true
scrolloff = 5
linemode = "size"

[preview]
# Word wrap long lines
wrap = "no"
tab_size = 2

# Image preview settings
max_width = 1200
max_height = 900
image_quality = 75
image_filter = "lanczos3"

[opener]
# Use system defaults - yazi handles most common cases
# Custom openers can be added here if needed

[open]
# File open rules - using sensible defaults
# yazi auto-detects file types and opens appropriately

[tasks]
micro_workers = 10
macro_workers = 25
image_alloc = 536870912  # 512MB
image_bound = [0, 0]

[plugin]
# Plugin preloaders for enhanced previews
prepend_preloaders = [
  # Archive previews
  { name = "*.zip", run = "archive" },
  { name = "*.tar*", run = "archive" },
  { name = "*.gz", run = "archive" },
  { name = "*.bz2", run = "archive" },
  { name = "*.xz", run = "archive" },
  { name = "*.7z", run = "archive" },
  { name = "*.rar", run = "archive" },
]
