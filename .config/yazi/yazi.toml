# Yazi configuration file
# https://yazi-rs.github.io/docs/configuration/yazi

[manager]
ratio = [ 1, 3, 4 ]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true

[preview]
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	{ run = '${EDITOR:-nvim} "$@"', desc = "Edit", block = true },
]
open = [
	{ run = 'open "$@"', desc = "Open" },
]
reveal = [
	{ run = 'open -R "$@"', desc = "Reveal in Finder" },
]
extract = [
	{ run = 'unar "$1"', desc = "Extract here" },
]
play = [
	{ run = 'mpv "$@"', desc = "Play" },
]

[open]
rules = [
	{ name = "*/", use = [ "edit", "open" ] },

	{ mime = "text/*", use = [ "edit", "open" ] },
	{ mime = "image/*", use = [ "open" ] },
	{ mime = "video/*", use = [ "play", "open" ] },
	{ mime = "audio/*", use = [ "play", "open" ] },
	{ mime = "inode/x-empty", use = [ "edit" ] },

	{ mime = "application/json", use = [ "edit" ] },
	{ mime = "*/javascript", use = [ "edit" ] },

	{ mime = "application/zip", use = [ "extract", "open" ] },
	{ mime = "application/gzip", use = [ "extract", "open" ] },
	{ mime = "application/x-tar", use = [ "extract", "open" ] },
	{ mime = "application/x-bzip", use = [ "extract", "open" ] },
	{ mime = "application/x-7z-compressed", use = [ "extract", "open" ] },
	{ mime = "application/x-rar", use = [ "extract", "open" ] },

	{ mime = "*", use = [ "open" ] },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
image_alloc = 536870912  # 512MB
image_bound = [ 0, 0 ]
suppress_preload = false

[plugin]

[input]
# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = "Create:"
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# trash
trash_title   = "Move {n} selected file{s} to trash? (y/N)"
trash_origin  = "top-center"
trash_offset  = [ 0, 2, 50, 3 ]

# delete
delete_title   = "Delete {n} selected file{s} permanently? (y/N)"
delete_origin  = "top-center"
delete_offset  = [ 0, 2, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

# overwrite
overwrite_title  = "Overwrite an existing file? (y/N)"
overwrite_origin = "top-center"
overwrite_offset = [ 0, 2, 50, 3 ]

# quit
quit_title  = "{n} task{s} running, sure to quit? (y/N)"
quit_origin = "top-center"
quit_offset = [ 0, 2, 50, 3 ]

[select]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by        = "Sort by:"
sort_sensitive = "• Sensitive"
sort_reverse   = "• Reverse"
sort_dir_first = "• Dir first"

[log]
enabled = false