# Yazi Keymap Configuration
# https://yazi-rs.github.io/docs/configuration/keymap
# Default vim-style bindings are already included

[mgr]
# Additional keybindings (prepended to defaults)
prepend_keymap = [
  # Quick navigation
  { on = "g", run = "cd ~", desc = "Go to home" },
  { on = ["g", "d"], run = "cd ~/Downloads", desc = "Go to Downloads" },
  { on = ["g", "c"], run = "cd ~/.config", desc = "Go to config" },
  { on = ["g", "w"], run = "cd ~/work", desc = "Go to work" },
  { on = ["g", "."], run = "cd ~/dotfiles", desc = "Go to dotfiles" },

  # Toggle hidden files with dot
  { on = ".", run = "hidden toggle", desc = "Toggle hidden files" },

  # Shell commands
  { on = ["s", "h"], run = "shell --interactive", desc = "Open shell here" },

  # Quick preview toggle
  { on = "P", run = "toggle_pane", desc = "Toggle preview pane" },
]

[input]
prepend_keymap = [
  # Vim-style input navigation
  { on = "<C-a>", run = "move -999", desc = "Move to line start" },
  { on = "<C-e>", run = "move 999", desc = "Move to line end" },
]
