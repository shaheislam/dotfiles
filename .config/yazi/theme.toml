# Tokyo Night theme for Yazi
# Based on Tokyo Night color scheme

[manager]
cwd = { fg = "#7aa2f7" }

# Hovered
hovered         = { bg = "#414868" }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#f7768e", italic = true }
find_position = { fg = "#bb9af7", bg = "reset", italic = true }

# Marker
marker_selected = { fg = "#9ece6a", bg = "#3b4261" }
marker_copied   = { fg = "#e0af68", bg = "#3b4261" }
marker_cut      = { fg = "#f7768e", bg = "#3b4261" }

# Tab
tab_active   = { fg = "#1a1b26", bg = "#7aa2f7" }
tab_inactive = { fg = "#a9b1d6", bg = "#24283b" }
tab_width    = 1

# Border
border_symbol = "│"
border_style  = { fg = "#565f89" }

# Highlighting
syntect_theme = ""

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#414868", bg = "#414868" }

# Mode
mode_normal = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
mode_select = { fg = "#1a1b26", bg = "#bb9af7", bold = true }
mode_unset  = { fg = "#1a1b26", bg = "#c0caf5", bold = true }

# Progress
progress_label  = { fg = "#c0caf5", bold = true }
progress_normal = { fg = "#7aa2f7", bg = "#24283b" }
progress_error  = { fg = "#f7768e", bg = "#24283b" }

# Permissions
permissions_t = { fg = "#7aa2f7" }
permissions_r = { fg = "#e0af68" }
permissions_w = { fg = "#f7768e" }
permissions_x = { fg = "#9ece6a" }
permissions_s = { fg = "#565f89" }

[input]
border   = { fg = "#7aa2f7" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#7aa2f7" }
active   = { fg = "#bb9af7" }
inactive = {}

[tasks]
border  = { fg = "#7aa2f7" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#313244" }
cand            = { fg = "#73daca" }
rest            = { fg = "#a9b1d6" }
desc            = { fg = "#bb9af7" }
separator       = "  "
separator_style = { fg = "#565f89" }

[help]
on      = { fg = "#bb9af7" }
exec    = { fg = "#73daca" }
desc    = { fg = "#a9b1d6" }
hovered = { bg = "#414868", bold = true }
footer  = { fg = "#24283b", bg = "#a9b1d6" }

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#73daca" },

	# Videos
	{ mime = "video/*", fg = "#e0af68" },
	{ mime = "audio/*", fg = "#e0af68" },

	# Archives
	{ mime = "application/zip",             fg = "#bb9af7" },
	{ mime = "application/gzip",            fg = "#bb9af7" },
	{ mime = "application/x-tar",           fg = "#bb9af7" },
	{ mime = "application/x-bzip",          fg = "#bb9af7" },
	{ mime = "application/x-bzip2",         fg = "#bb9af7" },
	{ mime = "application/x-7z-compressed", fg = "#bb9af7" },
	{ mime = "application/x-rar",           fg = "#bb9af7" },

	# Fallback
	{ name = "*", fg = "#a9b1d6" },
	{ name = "*/", fg = "#7aa2f7" }
]

