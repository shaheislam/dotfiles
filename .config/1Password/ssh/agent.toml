# 1Password SSH Agent Configuration
# Keys are offered in the order listed here
# GitHub will try each key until one works

# DFE SSH Key - offered first (for DFE repos)
[[ssh-keys]]
item = "SSH Key - shaheislamdfe"
vault = "DfE"

# Personal SSH Key - offered second
[[ssh-keys]]
item = "SSH Key - Github ShaheIslam Personal"
vault = "Private"

# Signing keys
[[ssh-keys]]
item = "GitHub DfE Signing"
vault = "DfE"

[[ssh-keys]]
item = "GitHub Personal Signing"
vault = "Private"

# Enable all other keys from both vaults as fallback
[[ssh-keys]]
vault = "DfE"

[[ssh-keys]]
vault = "Private"