# K9s Plugins Configuration
# Official plugins from https://github.com/derailed/k9s/tree/master/plugins
# Plus custom plugins for enhanced workflow

plugins:
  # ============== DEBUGGING & TROUBLESHOOTING ==============

  # Add debug container to pods
  debug:
    shortCut: Shift-D
    description: Add debug container
    dangerous: true
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - "kubectl debug -it -n=$NAMESPACE $POD --target=$NAME --image=nicolaka/netshoot:v0.13 --share-processes -- bash"

  # ============== LOGS & MONITORING ==============

  # Stern - Multi-pod log tailing with Splash colors
  stern:
    shortCut: Ctrl-L
    description: Logs via Stern with Splash
    scopes:
      - pods
      - deployments
    command: /Users/shaheislam/dotfiles/.config/k9s/scripts/stern-splash.sh
    background: false
    args:
      - $CONTEXT
      - $NAMESPACE
      - $NAME

  # Show pod metrics
  top-pod:
    shortCut: Shift-W
    description: Show metrics
    scopes:
      - pods
    command: kubectl
    background: false
    args:
      - top
      - pod
      - -n
      - $NAMESPACE
      - $NAME
      - --containers

  # Watch events for resource
  show-events:
    shortCut: Shift-E
    description: Show events
    scopes:
      - all
    command: kubectl
    background: false
    args:
      - get
      - events
      - -n
      - $NAMESPACE
      - --field-selector
      - involvedObject.name=$NAME
      - --sort-by='.lastTimestamp'

  # ============== EDITING & CONFIGURATION ==============

  # Edit resource in Neovim
  edit-nvim:
    shortCut: Ctrl-O
    description: Edit in Neovim
    scopes:
      - all
    command: bash
    background: false
    args:
      - -c
      - "kubectl get $RESOURCE_NAME -n $NAMESPACE -o yaml | nvim -c 'set ft=yaml' -"

  # Copy resource YAML to clipboard
  copy-yaml:
    shortCut: Ctrl-Y
    description: Copy YAML
    scopes:
      - all
    command: bash
    background: false
    args:
      - -c
      - "kubectl get $RESOURCE_NAME -n $NAMESPACE -o yaml | pbcopy && echo '✅ Copied to clipboard!'"

  # ============== CONTAINER OPERATIONS ==============

  # Exec with bash (falls back to sh if bash not available)
  exec-bash:
    shortCut: b
    description: Bash/sh shell
    scopes:
      - pods
      - containers
    command: bash
    background: false
    args:
      - -c
      - "kubectl exec -it -n $NAMESPACE $POD -c $NAME -- sh -c 'if command -v bash >/dev/null 2>&1; then exec bash; else exec sh; fi'"

  # Exec with sh (for alpine/minimal containers)
  exec-sh:
    shortCut: F5
    description: sh shell
    scopes:
      - pods
      - containers
    command: kubectl
    background: false
    args:
      - exec
      - -it
      - -n
      - $NAMESPACE
      - $POD
      - -c
      - $NAME
      - --
      - sh
      - -c
      - "export TERM=xterm-256color; export EDITOR=vi; if command -v nvim >/dev/null 2>&1; then export EDITOR=nvim; elif command -v vim >/dev/null 2>&1; then export EDITOR=vim; fi; exec sh"

  # Enhanced shell with Neovim attempt (for containers with package managers)
  exec-nvim:
    shortCut: F6
    description: Shell + try to install nvim
    scopes:
      - pods
      - containers
    command: kubectl
    background: false
    args:
      - exec
      - -it
      - -n
      - $NAMESPACE
      - $POD
      - -c
      - $NAME
      - --
      - bash
      - -c
      - |
        export TERM=xterm-256color
        if ! command -v nvim >/dev/null 2>&1; then
          echo "Attempting to install neovim..."
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y neovim 2>/dev/null || true
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache neovim 2>/dev/null || true
          elif command -v yum >/dev/null 2>&1; then
            yum install -y neovim 2>/dev/null || true
          fi
        fi
        if command -v nvim >/dev/null 2>&1; then
          export EDITOR=nvim
          echo "Neovim available! Use 'nvim' to edit files."
        elif command -v vim >/dev/null 2>&1; then
          export EDITOR=vim
          echo "Vim available. Use 'vim' to edit files."
        else
          export EDITOR=vi
          echo "Only vi available for editing."
        fi
        exec bash

  # Dive - Analyze container image layers
  dive:
    shortCut: d
    description: Dive image
    scopes:
      - containers
    command: dive
    background: false
    args:
      - $COL-IMAGE

  # Security scan with trivy
  trivy-scan:
    shortCut: Shift-V
    description: Security scan
    scopes:
      - containers
    command: trivy
    background: false
    args:
      - image
      - --severity
      - HIGH,CRITICAL
      - $COL-IMAGE

  # ============== DEPLOYMENT OPERATIONS ==============

  # Restart deployment/statefulset/daemonset
  restart:
    shortCut: Shift-T
    description: Restart
    scopes:
      - deployments
      - statefulsets
      - daemonsets
    command: kubectl
    background: false
    confirm: true
    args:
      - rollout
      - restart
      - $RESOURCE_NAME
      - -n
      - $NAMESPACE

  # Scale deployment
  scale:
    shortCut: Shift-S
    description: Scale deployment
    scopes:
      - deployments
    command: bash
    background: false
    args:
      - -c
      - "echo 'Enter replica count:' && read replicas && kubectl scale deployment/$NAME -n $NAMESPACE --replicas=$replicas"

  # Scale statefulset
  scale-sts:
    shortCut: Alt-S
    description: Scale statefulset
    scopes:
      - statefulsets
    command: bash
    background: false
    args:
      - -c
      - "echo 'Enter replica count:' && read replicas && kubectl scale statefulset/$NAME -n $NAMESPACE --replicas=$replicas"

  # ============== NETWORKING ==============

  # Interactive port-forward
  port-forward-custom:
    shortCut: Shift-K
    description: Port-forward
    scopes:
      - pods
      - services
    command: bash
    background: true
    args:
      - -c
      - "echo 'Enter local:remote ports (e.g., 8080:80):' && read ports && kubectl port-forward -n $NAMESPACE $RESOURCE_NAME $ports"

  # ============== FLUX GITOPS ==============

  # Toggle Flux suspend/resume for HelmRelease
  flux-toggle-helm:
    shortCut: Shift-G
    confirm: true
    scopes:
      - helmreleases
    description: Toggle suspend/resume
    command: bash
    background: false
    args:
      - -c
      - >-
        suspended=$(kubectl get helmreleases -n $NAMESPACE $NAME -o=jsonpath='{.spec.suspend}');
        verb=$([ "$suspended" = "true" ] && echo "resume" || echo "suspend");
        flux $verb helmrelease -n $NAMESPACE $NAME

  # Reconcile Flux resources
  flux-reconcile:
    shortCut: Shift-X
    confirm: false
    description: Flux reconcile
    scopes:
      - gitrepositories
      - helmreleases
      - kustomizations
    command: bash
    background: false
    args:
      - -c
      - "flux reconcile source git -n $NAMESPACE $NAME"

  # ============== OBSERVABILITY ==============

  # Watch resource changes
  watch-resource:
    shortCut: w
    description: Watch
    scopes:
      - all
    command: watch
    background: false
    args:
      - -n
      - "2"
      - kubectl
      - get
      - $RESOURCE_NAME
      - -n
      - $NAMESPACE
      - -o
      - wide

  # Get all resources in namespace
  get-all:
    shortCut: Shift-R
    description: Get all resources
    scopes:
      - namespaces
    command: kubectl
    background: false
    args:
      - get
      - all
      - -n
      - $NAME
      - -o
      - wide

  # ============== NODE OPERATIONS ==============

  # Shell into node
  node-shell:
    shortCut: Shift-U
    description: Node shell
    scopes:
      - nodes
    command: /Users/shaheislam/dotfiles/scripts/bin/kubectl-node-shell
    background: false
    confirm: true
    dangerous: true
    args:
      - $NAME

  # Drain node
  drain-node:
    shortCut: Ctrl-Q
    description: Drain node
    scopes:
      - nodes
    command: kubectl
    background: false
    confirm: true
    dangerous: true
    args:
      - drain
      - $NAME
      - --ignore-daemonsets
      - --delete-emptydir-data

  # ============== HELM OPERATIONS ==============

  # Show Helm values
  helm-values:
    shortCut: v
    description: Helm values
    scopes:
      - helmreleases
    command: bash
    background: false
    args:
      - -c
      - "helm get values -n $NAMESPACE $NAME | nvim -c 'set ft=yaml' -"

  # Helm diff
  helm-diff:
    shortCut: Shift-H
    description: Helm diff
    scopes:
      - helmreleases
    command: bash
    background: false
    args:
      - -c
      - "helm diff upgrade -n $NAMESPACE $NAME --reuse-values | less"

  # Helm purge - completely remove release
  helm-purge:
    shortCut: Ctrl-P
    description: Purge Helm release
    scopes:
      - helmreleases
    command: helm
    background: false
    confirm: true
    dangerous: true
    args:
      - uninstall
      - $NAME
      - -n
      - $NAMESPACE
      - --no-hooks

  # Helm rollback to previous version
  helm-rollback:
    shortCut: Ctrl-H
    description: Rollback Helm release
    scopes:
      - helmreleases
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - "helm rollback -n $NAMESPACE $NAME"

  # ============== ARGOCD INTEGRATION ==============

  # Sync ArgoCD application
  argocd-sync:
    shortCut: Shift-Y
    description: ArgoCD sync app
    scopes:
      - applications
    command: argocd
    background: false
    confirm: true
    args:
      - app
      - sync
      - $NAME
      - --force
      - --prune

  # Show ArgoCD diff
  argocd-diff:
    shortCut: Ctrl-D
    description: ArgoCD diff
    scopes:
      - applications
    command: argocd
    background: false
    args:
      - app
      - diff
      - $NAME

  # ============== CERT-MANAGER ==============

  # Check certificate readiness
  cert-ready:
    shortCut: Shift-C
    description: Certificate ready
    scopes:
      - certificates
    command: bash
    background: false
    args:
      - -c
      - "kubectl get certificate -n $NAMESPACE $NAME -o=jsonpath='{.status.conditions[?(@.type==\"Ready\")].message}'"

  # Force certificate renewal
  cert-renew:
    shortCut: Ctrl-C
    description: Renew certificate
    scopes:
      - certificates
    command: kubectl
    background: false
    confirm: true
    args:
      - patch
      - certificate
      - $NAME
      - -n
      - $NAMESPACE
      - --type=json
      - "-p=[{\"op\": \"replace\", \"path\": \"/spec/renewBefore\", \"value\":\"99999h\"}]"

  # ============== RESOURCE OPTIMIZATION ==============

  # Get resource recommendations
  resource-recommend:
    shortCut: Shift-Q
    description: Resource recommendations
    scopes:
      - pods
    command: bash
    background: false
    args:
      - -c
      - |
        echo "Analyzing resource usage for $NAME..."
        kubectl top pod -n $NAMESPACE $NAME --containers
        echo ""
        echo "Current requests/limits:"
        kubectl get pod -n $NAMESPACE $NAME -o json | jq '.spec.containers[] | {name: .name, requests: .resources.requests, limits: .resources.limits}'

  # ============== ADVANCED TROUBLESHOOTING ==============

  # Remove finalizers (for stuck resources)
  remove-finalizers:
    shortCut: Ctrl-F
    description: Remove finalizers (DANGEROUS)
    scopes:
      - all
    command: kubectl
    background: false
    confirm: true
    dangerous: true
    args:
      - patch
      - $RESOURCE_NAME
      - -n
      - $NAMESPACE
      - --type=json
      - "-p=[{\"op\": \"remove\", \"path\": \"/metadata/finalizers\"}]"

  # Debug PVC by mounting into temp container
  pvc-debug:
    shortCut: Shift-P
    description: Debug PVC
    scopes:
      - persistentvolumeclaims
    command: kubectl
    background: false
    args:
      - run
      - -it
      - --rm
      - pvc-debugger-$RANDOM
      - --image=busybox
      - -n
      - $NAMESPACE
      - --overrides
      - |
        {
          "spec": {
            "containers": [{
              "name": "debugger",
              "image": "busybox",
              "command": ["sh"],
              "stdin": true,
              "tty": true,
              "volumeMounts": [{
                "name": "pvc",
                "mountPath": "/pvc"
              }]
            }],
            "volumes": [{
              "name": "pvc",
              "persistentVolumeClaim": {
                "claimName": "$NAME"
              }
            }]
          }
        }

  # DNS debugging
  dns-trace:
    shortCut: Ctrl-N
    description: Trace DNS
    scopes:
      - pods
    command: kubectl
    background: false
    args:
      - exec
      - -it
      - -n
      - $NAMESPACE
      - $NAME
      - --
      - sh
      - -c
      - "nslookup kubernetes.default || dig kubernetes.default || host kubernetes.default || echo 'No DNS tools found'"

  # ============== JOB MANAGEMENT ==============

  # Toggle CronJob suspend state
  cronjob-toggle:
    shortCut: Ctrl-J
    description: Toggle CronJob suspend
    scopes:
      - cronjobs
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - |
        suspended=$(kubectl get cronjob -n $NAMESPACE $NAME -o=jsonpath='{.spec.suspend}')
        new_state=$([ "$suspended" = "true" ] && echo "false" || echo "true")
        kubectl patch cronjob -n $NAMESPACE $NAME -p "{\"spec\":{\"suspend\":$new_state}}"

  # ============== ADVANCED LOG PARSING ==============

  # Parse JSON logs with jq
  logs-json:
    shortCut: j
    description: Parse JSON logs
    scopes:
      - pods
      - containers
    command: bash
    background: false
    args:
      - -c
      - "kubectl logs -n $NAMESPACE $POD -c $NAME --tail=100 | jq '.' 2>/dev/null || kubectl logs -n $NAMESPACE $POD -c $NAME --tail=100"

  # Bunyan formatted logs
  logs-bunyan:
    shortCut: Ctrl-B
    description: Bunyan format logs
    scopes:
      - pods
      - containers
    command: bash
    background: false
    args:
      - -c
      - "kubectl logs -n $NAMESPACE $POD -c $NAME --tail=100 | bunyan 2>/dev/null || kubectl logs -n $NAMESPACE $POD -c $NAME --tail=100"

  # ============== KEDA AUTOSCALING ==============

  # Toggle KEDA ScaledObject
  keda-toggle:
    shortCut: Ctrl-K
    description: Toggle KEDA ScaledObject
    scopes:
      - scaledobjects
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - |
        paused=$(kubectl get scaledobject -n $NAMESPACE $NAME -o=jsonpath='{.metadata.annotations.keda\.sh/paused}')
        if [ "$paused" = "true" ]; then
          kubectl annotate scaledobject -n $NAMESPACE $NAME keda.sh/paused-
        else
          kubectl annotate scaledobject -n $NAMESPACE $NAME keda.sh/paused=true
        fi

  # ============== NETWORK DEBUGGING ==============

  # Launch netshoot container for network debugging
  netshoot:
    shortCut: Ctrl-G
    description: Network debug container
    scopes:
      - nodes
      - pods
    command: kubectl
    background: false
    args:
      - run
      - -it
      - --rm
      - netshoot-$RANDOM
      - --image=nicolaka/netshoot:latest
      - -n
      - $NAMESPACE
      - --
      - bash

  # Capture network traffic with tcpdump
  tcpdump:
    shortCut: Ctrl-T
    description: Capture network traffic
    scopes:
      - pods
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - "kubectl exec -it -n $NAMESPACE $NAME -- sh -c 'tcpdump -i any -nn -s0 -v port 80 or port 443 2>/dev/null || echo \"tcpdump not available in container\"'"

  # ============== EXTERNAL SECRETS ==============

  # Refresh external secret
  external-secret-refresh:
    shortCut: Ctrl-E
    description: Refresh ExternalSecret
    scopes:
      - externalsecrets
    command: kubectl
    background: false
    args:
      - annotate
      - externalsecret
      - -n
      - $NAMESPACE
      - $NAME
      - force-sync="-"
      - --overwrite

  # ============== CROSSPLANE ==============

  # Get Crossplane resource status
  crossplane-status:
    shortCut: Ctrl-X
    description: Crossplane status
    scopes:
      - managed
      - composite
    command: kubectl
    background: false
    args:
      - get
      - $RESOURCE_NAME
      - -n
      - $NAMESPACE
      - -o
      - json
      - "|"
      - jq
      - '.status.conditions'

  # ============== ISTIO SERVICE MESH ==============

  # Check Istio proxy config
  istio-proxy-config:
    shortCut: Ctrl-U
    description: Istio proxy config
    scopes:
      - pods
    command: istioctl
    background: false
    args:
      - proxy-config
      - all
      - -n
      - $NAMESPACE
      - $NAME

  # ============== ARGO ROLLOUTS ==============

  # Promote Argo Rollout
  argo-promote:
    shortCut: Ctrl-R
    description: Promote rollout
    scopes:
      - rollouts
    command: kubectl-argo-rollouts
    background: false
    confirm: true
    args:
      - promote
      - -n
      - $NAMESPACE
      - $NAME

  # Abort Argo Rollout
  argo-abort:
    shortCut: Ctrl-A
    description: Abort rollout
    scopes:
      - rollouts
    command: kubectl-argo-rollouts
    background: false
    confirm: true
    dangerous: true
    args:
      - abort
      - -n
      - $NAMESPACE
      - $NAME