# K9s Aliases
# Shortcuts for common Kubernetes resources

aliases:
  # Core resources
  pp: v1/pods
  dp: apps/v1/deployments
  rs: apps/v1/replicasets
  ss: apps/v1/statefulsets
  ds: apps/v1/daemonsets
  svc: v1/services
  ep: v1/endpoints

  # Config & Storage
  cm: v1/configmaps
  sec: v1/secrets
  pv: v1/persistentvolumes
  pvc: v1/persistentvolumeclaims
  sc: storage.k8s.io/v1/storageclasses

  # Networking
  ing: networking.k8s.io/v1/ingresses
  np: networking.k8s.io/v1/networkpolicies

  # Jobs & Crons
  job: batch/v1/jobs
  cj: batch/v1/cronjobs

  # RBAC
  sa: v1/serviceaccounts
  role: rbac.authorization.k8s.io/v1/roles
  cr: rbac.authorization.k8s.io/v1/clusterroles
  rb: rbac.authorization.k8s.io/v1/rolebindings
  crb: rbac.authorization.k8s.io/v1/clusterrolebindings

  # Namespaces & Nodes
  ns: v1/namespaces
  no: v1/nodes

  # Custom Resources (common)
  hr: helm.toolkit.fluxcd.io/v2beta1/helmreleases
  ks: kustomize.toolkit.fluxcd.io/v1/kustomizations
  gr: source.toolkit.fluxcd.io/v1/gitrepositories

  # Horizontal Pod Autoscalers
  hpa: autoscaling/v2/horizontalpodautoscalers
  vpa: autoscaling.k8s.io/v1/verticalpodautoscalers

  # Policy
  pdb: policy/v1/poddisruptionbudgets
  psp: policy/v1beta1/podsecuritypolicies

  # Events
  ev: v1/events