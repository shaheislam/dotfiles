"$schema" = 'https://starship.rs/config-schema.json'

# Minimal prompt inspired by omerxx style with Catppuccin Mocha colors
format = """
$directory\
$git_branch\
$git_status\
$character """

right_format = """
$aws\
$kubernetes\
$cmd_duration\
"""

# PERF: 1000ms accommodates git command spikes under heavy load (concurrent
# agents, multiple worktrees, disk I/O contention). Git modules typically
# complete in ~30ms (with fsmonitor + untrackedCache), but spike to 300ms+
# under load. Prior values: 100ms (frequent timeouts), 300ms (sporadic
# timeouts in worktrees). Starship default is 500ms.
command_timeout = 1000
palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = true
style = "bg:peach fg:base"

[os.symbols]
