[username]
show_always = false
style_user = "fg:mauve"
style_root = "fg:red bold"
format = '[$user ]($style)'

[directory]
style = "fg:lavender bold"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = ""
read_only = " َ°Œ¾"
truncate_to_repo = false

[directory.substitutions]
"~" = "~"

[git_branch]
symbol = " "
style = "fg:mauve"
truncation_length = 25
truncation_symbol = 'â€¦'
ignore_branches = ['master', 'main']
format = '[$symbol$branch]($style)'
only_attached = true

[git_status]
style = "fg:yellow"
ahead = 'â‡،${count}'
diverged = 'â‡•â‡،${ahead_count}â‡£${behind_count}'
behind = 'â‡£${count}'
format = '[$all_status$ahead_behind]($style) '
ignore_submodules = true

[nodejs]
symbol = " "
style = "fg:green"
format = '[$symbol($version)]($style) '
disabled = true

[c]
symbol = " "
style = "fg:blue"
format = '[$symbol($version)]($style) '

[rust]
symbol = " "
style = "fg:peach"
format = '[$symbol($version)]($style) '
disabled = true

[golang]
symbol = " "
style = "fg:sky bold"
format = '[$symbol($version)]($style) '
disabled = true

[php]
symbol = " "
style = "fg:mauve"
format = '[$symbol($version)]($style) '

[java]
symbol = " "
style = "fg:red"
format = '[$symbol($version)]($style) '

[kotlin]
symbol = " "
style = "fg:blue"
format = '[$symbol($version)]($style) '

[haskell]
symbol = " "
style = "fg:mauve"
format = '[$symbol($version)]($style) '

[python]
symbol = " "
style = "fg:yellow"
format = '[$symbol($version)]($style) '
disabled = true

[docker_context]
symbol = " "
style = "fg:sapphire"
format = '[$symbol$context]($style) '
disabled = true

[conda]
style = "fg:green"
format = '[$symbol$environment]($style) '

[aws]
symbol = " "
style = "fg:peach"
format = '[$symbol$profile(@$region)]($style) '
force_display = false

[aws.region_aliases]
