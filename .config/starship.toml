"$schema" = 'https://starship.rs/config-schema.json'

# Minimal prompt inspired by omerxx style with Catppuccin Mocha colors
format = """
$directory\
$git_branch\
$git_status\
$character """

right_format = """
$golang\
$python\
$rust\
$nodejs\
$aws\
$azure\
$kubernetes\
$terraform\
$cmd_duration\
"""

command_timeout = 1000
palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = true
style = "bg:peach fg:base"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = false
style_user = "fg:mauve"
style_root = "fg:red bold"
format = '[$user ]($style)'

[directory]
style = "fg:lavender bold"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"~/dotfiles" = " "
"~/work" = " "
"~" = " "

[git_branch]
symbol = " "
style = "fg:mauve"
truncation_length = 25
truncation_symbol = '…'
ignore_branches = ['master', 'main']
format = '[$symbol$branch]($style)'

[git_status]
style = "fg:yellow"
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
format = '[$all_status$ahead_behind]($style) '

[nodejs]
symbol = " "
style = "fg:green"
format = '[$symbol($version)]($style) '

[c]
symbol = " "
style = "fg:blue"
format = '[$symbol($version)]($style) '

[rust]
symbol = " "
style = "fg:peach"
format = '[$symbol($version)]($style) '

[golang]
symbol = " "
style = "fg:sky bold"
format = '[$symbol($version)]($style) '

[php]
symbol = " "
style = "fg:mauve"
format = '[$symbol($version)]($style) '

[java]
symbol = " "
style = "fg:red"
format = '[$symbol($version)]($style) '

[kotlin]
symbol = " "
style = "fg:blue"
format = '[$symbol($version)]($style) '

[haskell]
symbol = " "
style = "fg:mauve"
format = '[$symbol($version)]($style) '

[python]
symbol = " "
style = "fg:yellow"
format = '[$symbol($version)]($style) '

[docker_context]
symbol = " "
style = "fg:sapphire"
format = '[$symbol$context]($style) '
disabled = true

[conda]
style = "fg:green"
format = '[$symbol$environment]($style) '

[aws]
symbol = " "
style = "fg:peach"
format = '[$symbol$profile(@$region)]($style) '
force_display = false

[aws.region_aliases]
us-west-2    = "usw2"
us-west-1    = "usw1"
us-east-2    = "use2"
us-east-1    = "use1"
ca-central-1 = "ca"
eu-west-1    = "euw1"
eu-central-1 = "euc1"

[aws.profile_aliases]
petlab = "LABS"
security = "SEC"
management = "MGT"
prod = "PROD"
logging = "LOG"

[azure]
symbol = " "
style = "fg:sapphire"
format = '[$symbol$subscription]($style) '
disabled = false

[azure.subscription_aliases]
s165-teachingqualificationsservice-development = "s165-dev"
s165-teachingqualificationsservice-test = "s165-test"
s165-teachingqualificationsservice-production = "s165-prod"
s189-teacher-services-cloud-development = "s189-dev"
s189-teacher-services-cloud-test = "s189-test"
s189-teacher-services-cloud-production = "s189-prod"

[kubernetes]
symbol = "☸ "
style = "fg:lavender"
format = '[$symbol$context(\($namespace\))]($style) '
disabled = false

[terraform]
symbol = "󱁢 "
style = "fg:mauve"
format = '[$symbol($version)]($style) '
disabled = false

[time]
disabled = true
time_format = "%R"
style = "fg:overlay1"
format = '[$time]($style) '

[cmd_duration]
format = "[$duration]($style) "
style = "fg:overlay1"
min_time = 500

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[➜](bold fg:green)'
error_symbol = '[➜](bold fg:red)'
vimcmd_symbol = '[N](bold fg:green) >>>'
vimcmd_replace_one_symbol = '[R](bold fg:mauve)'
vimcmd_replace_symbol = '[R](bold fg:mauve)'
vimcmd_visual_symbol = '[V](bold fg:yellow)'