[azure]
symbol = " "
style = "fg:sapphire"
format = '[$symbol$subscription]($style) '
disabled = true

[azure.subscription_aliases]
s165-teachingqualificationsservice-development = "s165-dev"
s165-teachingqualificationsservice-test = "s165-test"
s165-teachingqualificationsservice-production = "s165-prod"
s189-teacher-services-cloud-development = "s189-dev"
s189-teacher-services-cloud-test = "s189-test"
s189-teacher-services-cloud-production = "s189-prod"

[kubernetes]
symbol = " "
style = "fg:lavender"
format = '[$symbol$context(\($namespace\))]($style) '
# PERF: Disabled by default â€” reads ~/.kube/config on every prompt (~110ms).
# Enable per-project via: set -gx KUBECONFIG ~/.kube/config
# or set [kubernetes] disabled = false in a project-local starship.toml
disabled = true

[terraform]
symbol = " "
style = "fg:mauve"
format = '[$symbol($version)]($style) '
disabled = true

[time]
disabled = true
time_format = "%R"
style = "fg:overlay1"
format = '[$time]($style) '

[cmd_duration]
format = "[$duration]($style) "
style = "fg:overlay1"
min_time = 500

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[â‍œ](bold fg:green)'
error_symbol = '[â‍œ](bold fg:red)'
vimcmd_symbol = '[N](bold fg:green) >>>'
vimcmd_replace_one_symbol = '[R](bold fg:mauve)'
vimcmd_replace_symbol = '[R](bold fg:mauve)'
vimcmd_visual_symbol = '[V](bold fg:yellow)'

