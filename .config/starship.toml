"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в•ӯв•ҙ](fg:arrow)\
$os\
[у°Ҡ ](fg:color_fg0)\
$directory\
[оӮ°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[оӮ°](fg:color_aqua bg:color_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮ°](fg:color_blue bg:color_orange)\
$docker_context\
$conda\
$aws\
[оӮ°](fg:color_orange bg:color_bg3)\
$azure\
[оӮ°](fg:color_bg3 bg:color_purple)\
$kubernetes\
[оӮ°](fg:color_purple bg:color_bg1)\
$terraform\
[оӮ°](fg:color_bg1)\
$cmd_duration
[в•°в”Җ](fg:arrow)$character\
"""

palette = 'tokyo_night'

[palettes.tokyo_night]
color_fg0 = '#c0caf5'
color_bg1 = '#1a1b26'
color_bg3 = '#414868'
color_blue = '#7aa2f7'
color_aqua = '#2ac3de'
color_green = '#9ece6a'
color_orange = '#ff9e64'
color_purple = '#bb9af7'
color_red = '#f7768e'
color_yellow = '#e0af68'
arrow = '#bb9af7'
color_white = '#ffffff'
color_black = '#000000'

[os]
disabled = true
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = ""
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = ""
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = ""
Amazon = ""
Android = ""
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = ""
CentOS = ""
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = ""

[username]
show_always = true
style_user = "bg:color_orange fg:color_black"
style_root = "bg:color_orange fg:color_black"
format = '[ $user ]($style)'

[directory]
style = "fg:color_black bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ""

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = "у°қҡ "
"Pictures" = " "
"Developer" = "у°ІӢ "

[git_branch]
symbol = ""
style = "bg:color_aqua"
truncation_length = 25
truncation_symbol = 'вҖҰ'
ignore_branches = ['master', 'main']
format = '[ $symbol$branch ]($style fg:color_black)'

[git_status]
style = "bg:color_aqua"
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
format = '[$all_status$ahead_behind ]($style fg:color_black)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[java]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[kotlin]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[python]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_white bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_white bg:color_bg3)]($style)'

[aws]
symbol = ""
style = "bg:color_orange"
format = '[[ $symbol$profile(@$region) ](fg:color_black bg:color_orange)]($style)'
force_display = false

[aws.region_aliases]
us-west-2    = "usw2"
us-west-1    = "usw1"
us-east-2    = "use2"
us-east-1    = "use1"
ca-central-1 = "ca"
eu-west-1    = "euw1"
eu-central-1 = "euc1"

[aws.profile_aliases]
petlab = "LABS"
security = "SEC"
management = "MGT"
prod = "PROD"
logging = "LOG"

[azure]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol$subscription ](fg:color_white bg:color_bg3)]($style)'
disabled = false

[azure.subscription_aliases]
s165-teachingqualificationsservice-development = "s165-dev"
s165-teachingqualificationsservice-test = "s165-test"
s165-teachingqualificationsservice-production = "s165-prod"
s189-teacher-services-cloud-development = "s189-dev"
s189-teacher-services-cloud-test = "s189-test"
s189-teacher-services-cloud-production = "s189-prod"

[kubernetes]
symbol = ""
style = "bg:color_purple"
format = '[[ $context(\($namespace\)) ](fg:color_white bg:color_purple)]($style)'
disabled = false

[terraform]
symbol = "уұҒў "
style = "bg:color_bg3"
format = '[[ $symbol(tf:$version) ](fg:color_white bg:color_bg3)]($style)'
disabled = false

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[cmd_duration]
format = " [$duration]($style)"
style = "fg:color_yellow"
min_time = 500

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[в–¶](bold fg:color_green)'
error_symbol = '[в–¶](bold fg:color_red)'
vimcmd_symbol = '[в–¶](bold fg:color_green)'
vimcmd_replace_one_symbol = '[в–¶](bold fg:color_purple)'
vimcmd_replace_symbol = '[в–¶](bold fg:color_purple)'
vimcmd_visual_symbol = '[в–¶](bold fg:color_yellow)'
