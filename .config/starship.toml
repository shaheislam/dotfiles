"$schema" = 'https://starship.rs/config-schema.json'

# Minimal prompt inspired by omerxx style with Miniautumn colors
format = """
$directory\
$git_branch\
$character """

right_format = """
$aws\
$kubernetes\
$cmd_duration\
"""

# PERF: Keep prompt commands bounded. `git_status` is disabled, so the remaining
# modules should complete well under this even in worktrees.
command_timeout = 200
palette = 'miniautumn'

[palettes.miniautumn]
rosewater = "#f3f1e9"
flamingo = "#fac6c1"
pink = "#f1c6e2"
mauve = "#e4caf1"
red = "#f1c6e2"
maroon = "#fac6c1"
peach = "#fac6c1"
yellow = "#efcfab"
green = "#d3daad"
teal = "#b4e2c7"
sky = "#a7e1e8"
sapphire = "#a7e1e8"
blue = "#b8d9fc"
lavender = "#d7cef9"
text = "#d7d5cd"
subtext1 = "#b7b5ad"
subtext0 = "#97958e"
overlay2 = "#97958e"
overlay1 = "#5e5762"
overlay0 = "#423b45"
surface2 = "#5e5762"
surface1 = "#423b45"
surface0 = "#1a141d"
base = "#262029"
mantle = "#1a141d"
crust = "#0b060e"

[username]
show_always = false
style_user = "fg:mauve"
style_root = "fg:red bold"
format = '[$user ]($style)'

[directory]
style = "fg:lavender bold"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = ""
read_only = " ó°Śľ"
truncate_to_repo = false

[directory.substitutions]
"~" = "~"

[git_branch]
symbol = " "
style = "fg:mauve"
truncation_length = 25
truncation_symbol = 'â€¦'
ignore_branches = ['master', 'main']
format = '[$symbol$branch]($style)'
only_attached = true

[git_status]
disabled = true
style = "fg:yellow"
ahead = 'â‡ˇ${count}'
diverged = 'â‡•â‡ˇ${ahead_count}â‡Ł${behind_count}'
behind = 'â‡Ł${count}'
format = '[$all_status$ahead_behind]($style) '
ignore_submodules = true

[c]
symbol = " "
style = "fg:blue"
format = '[$symbol($version)]($style) '

[php]
symbol = " "
style = "fg:mauve"
format = '[$symbol($version)]($style) '

[java]
symbol = " "
style = "fg:red"
format = '[$symbol($version)]($style) '

[kotlin]
symbol = " "
style = "fg:blue"
format = '[$symbol($version)]($style) '

[haskell]
symbol = " "
style = "fg:mauve"
format = '[$symbol($version)]($style) '

[conda]
style = "fg:green"
format = '[$symbol$environment]($style) '

[aws]
symbol = " "
style = "fg:peach"
format = '[$symbol$profile(@$region)]($style) '
force_display = false

[aws.region_aliases]
us-west-2 = "usw2"
us-west-1 = "usw1"
us-east-2 = "use2"
us-east-1 = "use1"
ca-central-1 = "ca"
eu-west-1 = "euw1"
eu-central-1 = "euc1"

[aws.profile_aliases]
petlab = "labs"
security = "sec"
management = "management"
prod = "prod"
logging = "logging"

[azure]
symbol = " "
style = "fg:sapphire"
format = '[$symbol$subscription]($style) '
disabled = true

[azure.subscription_aliases]
s165-teachingqualificationsservice-development = "s165-dev"
s165-teachingqualificationsservice-test = "s165-test"
s165-teachingqualificationsservice-production = "s165-prod"
s189-teacher-services-cloud-development = "s189-dev"
s189-teacher-services-cloud-test = "s189-test"
s189-teacher-services-cloud-production = "s189-prod"

[kubernetes]
symbol = " "
style = "fg:lavender"
format = '[$symbol$context(\($namespace\))]($style) '
# PERF: Disabled by default â€” reads ~/.kube/config on every prompt (~110ms).
# Enable per-project via: set -gx KUBECONFIG ~/.kube/config
# or set [kubernetes] disabled = false in a project-local starship.toml
disabled = true

[cmd_duration]
format = "[$duration]($style) "
style = "fg:overlay1"
min_time = 500

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[âžś](bold fg:green)'
error_symbol = '[âžś](bold fg:red)'
vimcmd_symbol = '[N](bold fg:green) >>>'
vimcmd_replace_one_symbol = '[R](bold fg:mauve)'
vimcmd_replace_symbol = '[R](bold fg:mauve)'
vimcmd_visual_symbol = '[V](bold fg:yellow)'
