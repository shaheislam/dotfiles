name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write    # PR summary comments
  security-events: write  # CodeQL analysis

concurrency:
  group: pr-validation-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better diff

      - name: Setup formatters
        run: |
          # Install formatters
          pip install black isort
          npm install -g prettier
          brew install shfmt

      - name: Check shell script formatting
        run: |
          # Check shell scripts
          find . -name "*.sh" -type f | while read -r file; do
            if ! shfmt -d "$file"; then
              echo "❌ $file needs formatting"
              exit 1
            fi
          done

      - name: Check JSON formatting
        run: |
          find . -name "*.json" -type f | while read -r file; do
            if ! python -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ $file has invalid JSON"
              exit 1
            fi
          done

      - name: Validate commit messages
        run: |
          # Check commit messages follow conventional commits
          commits=$(git log --format=%s origin/main..HEAD)

          while IFS= read -r commit; do
            if ! echo "$commit" | \
              grep -qE '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .+'; then
              echo "❌ Invalid commit message: $commit"
              echo "Please use conventional commits format: type(scope): description"
              exit 1
            fi
          done <<< "$commits"

  test-changes:
    name: Test Changed Files
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files_yaml: |
            shell:
              - '**/*.sh'
              - '**/*.fish'
              - '**/*.zsh'
              - '.bashrc'
              - '.zshrc'
            config:
              - '.config/**'
              - '.tmux.conf'
            brew:
              - 'homebrew/Brewfile'
            claude:
              - '.claude/**'
              - 'CLAUDE.md'

      - name: Test shell changes
        if: steps.changed-files.outputs.shell_any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.shell_all_changed_files }}; do
            case "$file" in
              *.sh)
                shellcheck "$file" || exit 1
                ;;
              *.fish)
                fish -n "$file" || exit 1
                ;;
              *.zsh|.zshrc)
                zsh -n "$file" || exit 1
                ;;
              .bashrc)
                bash -n "$file" || exit 1
                ;;
            esac
          done

      - name: Test Brewfile changes
        if: steps.changed-files.outputs.brew_any_changed == 'true' && runner.os == 'macOS'
        run: |
          brew bundle check --file=homebrew/Brewfile --no-upgrade

  compatibility-check:
    name: Compatibility Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check POSIX compliance
        run: |
          # Check for non-POSIX constructs in shell scripts
          find scripts -name "*.sh" -type f | while read -r file; do
            if grep -E '\[\[|\]\]|<<<|&>' "$file"; then
              echo "⚠️ $file contains bash-specific constructs"
            fi
          done

      - name: Check dependencies
        run: |
          # Create dependency report
          {
            echo "# Dependency Report"
            echo ""
            echo "## Required Tools"
            echo ""

            # Extract required commands from setup script
            grep -E '(command -v|which|type)' scripts/setup.sh | \
              sed -E 's/.*(command -v|which|type) ([a-zA-Z0-9_-]+).*/- \2/' | \
              sort -u

            echo ""
            echo "## Homebrew Dependencies"
            echo ""

            # Parse Brewfile
            if [[ -f "homebrew/Brewfile" ]]; then
              grep -E '^(brew|cask)' homebrew/Brewfile | \
                sed -E 's/(brew|cask) "([^"]+)".*/- \2/' | \
                sort
            fi
          } > dependency-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.md

  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: shell, python
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Patterns to check
          patterns=(
            "password.*=.*['\"].*['\"]"
            "api[_-]?key.*=.*['\"].*['\"]"
            "token.*=.*['\"].*['\"]"
            "secret.*=.*['\"].*['\"]"
          )

          for pattern in "${patterns[@]}"; do
            if grep -r -i "$pattern" . \
               --exclude-dir=.git \
               --exclude="*.md" \
               --exclude="setup.sh"; then
              echo "⚠️ Potential secret found matching pattern: $pattern"
              exit 1
            fi
          done

  pr-summary:
    name: Generate PR Summary
    runs-on: ubuntu-latest
    needs: [lint-and-format, test-changes, compatibility-check, security-review]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Generate summary
        run: |
          {
            echo "# PR Validation Summary"
            echo ""
            echo "## Check Results"
            echo ""
            echo "- Lint & Format: ${{ needs.lint-and-format.result == 'success' && '✅' || '❌' }}"
            echo "- Tests: ${{ needs.test-changes.result == 'success' && '✅' || '❌' }}"
            echo "- Compatibility: ${{ needs.compatibility-check.result == 'success' && '✅' || '❌' }}"
            echo "- Security: ${{ needs.security-review.result == 'success' && '✅' || '❌' }}"
            echo ""
            echo "## Changed Files"
            echo ""
            git diff --name-only origin/main...HEAD | head -20
            echo ""
            echo "## Commit History"
            echo ""
            git log --oneline origin/main..HEAD
          } > pr-summary.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('pr-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
