name: Monthly Changelog Review

on:
  schedule:
    - cron: '0 9 1 * *'  # 1st of each month at 9 AM UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back'
        default: '30'
        type: string
      category:
        description: 'Filter by category (empty for all)'
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: monthly-changelog-review
  cancel-in-progress: false

jobs:
  changelog-review:
    name: Changelog Review
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install jq gh

      - name: Fetch changelogs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_DAYS: ${{ inputs.days || '30' }}
          INPUT_CATEGORY: ${{ inputs.category }}
        run: |
          args=(--days "$INPUT_DAYS")
          [ -n "$INPUT_CATEGORY" ] && args+=(--category "$INPUT_CATEGORY")

          chmod +x scripts/harness/changelog-review.sh
          bash scripts/harness/changelog-review.sh "${args[@]}"

      - name: Review config
        run: |
          chmod +x scripts/harness/changelog-config-review.sh
          bash scripts/harness/changelog-config-review.sh

      - name: Prepare PR content
        id: prepare
        run: |
          report_dir="$HOME/.claude/harness/changelog-reports"
          today=$(date "+%Y-%m-%d")

          review_file="$report_dir/config-review-${today}.md"
          changelog_file="$report_dir/changelog-${today}.md"
          data_file="$report_dir/changelog-${today}.jsonl"

          # Count actionable items
          action_count=0
          if [ -f "$data_file" ]; then
            action_count=$(jq -r 'select(.flags != "") | .name' "$data_file" | sort -u | wc -l | tr -d ' ')
          fi

          echo "action_count=$action_count" >> "$GITHUB_OUTPUT"
          echo "today=$today" >> "$GITHUB_OUTPUT"

          # Copy reports to repo for PR
          mkdir -p reports
          [ -f "$review_file" ] && cp "$review_file" reports/config-review.md
          [ -f "$changelog_file" ] && cp "$changelog_file" reports/changelog-report.md
          [ -f "$data_file" ] && cp "$data_file" reports/changelog-data.jsonl

      - name: Build PR body
        id: body
        run: |
          today=$(date "+%Y-%m-%d")
          report_dir="$HOME/.claude/harness/changelog-reports"
          data_file="$report_dir/changelog-${today}.jsonl"

          {
            echo "## Monthly Changelog Review"
            echo ""

            if [ -f "$data_file" ]; then
              total=$(wc -l < "$data_file" | tr -d ' ')
              breaking=$(grep -c '"breaking"' "$data_file" 2>/dev/null || echo 0)
              security=$(grep -c '"security"' "$data_file" 2>/dev/null || echo 0)
              features=$(grep -c '"new-feature"' "$data_file" 2>/dev/null || echo 0)
              config_changes=$(grep -c '"config-change"' "$data_file" 2>/dev/null || echo 0)

              echo "| Metric | Count |"
              echo "|--------|-------|"
              echo "| Total releases | $total |"
              echo "| Breaking changes | $breaking |"
              echo "| Security fixes | $security |"
              echo "| New features | $features |"
              echo "| Config changes | $config_changes |"
              echo ""

              if [ "$breaking" -gt 0 ]; then
                echo "### Breaking Changes"
                echo ""
                grep '"breaking"' "$data_file" | jq -r '"- **\(.name)** \(.tag) — [\(.tag)](\(.url))"' | sort -u
                echo ""
              fi

              if [ "$security" -gt 0 ]; then
                echo "### Security Updates"
                echo ""
                grep '"security"' "$data_file" | jq -r '"- **\(.name)** \(.tag) — [\(.tag)](\(.url))"' | sort -u
                echo ""
              fi
            else
              echo "No releases found requiring attention."
            fi

            echo ""
            echo "See attached reports for full details."
          } > /tmp/pr-body.md

          {
            echo 'body<<EOF'
            cat /tmp/pr-body.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create PR if action items found
        if: steps.prepare.outputs.action_count > 0
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: monthly changelog review'
          title: 'Monthly Changelog Review'
          body: ${{ steps.body.outputs.body }}
          branch: changelog-review
          delete-branch: true
          add-paths: |
            reports/

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: changelog-reports
          path: reports/
          retention-days: 90
