name: Sync & Deploy

on:
  workflow_dispatch:
    inputs:
      target_machine:
        description: 'Target machine to sync'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - personal
          - work

  push:
    branches: [main]
    paths:
      - '.config/**'
      - 'scripts/**'
      - 'homebrew/Brewfile'
      - '.tmux.conf'
      - '.zshrc'
      - '.bashrc'

permissions:
  contents: read

concurrency:
  group: sync-${{ github.ref }}
  cancel-in-progress: false  # Release bundles must complete

jobs:
  create-release:
    name: Create Release Bundle
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Create dotfiles bundle
        run: |
          # Create a clean bundle without git history
          tar -czf dotfiles-bundle.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            .

      - name: Generate changelog
        run: |
          {
            echo "# Changelog"
            echo "Generated: $(date)"
            echo ""
            echo "## Recent Changes"
            git log --oneline -10
          } > CHANGELOG.md

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: dotfiles-bundle
          path: |
            dotfiles-bundle.tar.gz
            CHANGELOG.md
          retention-days: 30

  validate-changes:
    name: Validate Changes
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check what changed
        run: |
          echo "=== Changed files ==="
          git diff --name-only HEAD~1

      - name: Validate critical files
        run: |
          # Check if critical files were modified
          critical_files=(
            "scripts/setup.sh"
            "homebrew/Brewfile"
            ".config/fish/config.fish"
            ".tmux.conf"
          )

          for file in "${critical_files[@]}"; do
            if git diff --name-only HEAD~1 | grep -q "$file"; then
              echo "Critical file changed: $file"
              # Add extra validation for critical files
              case "$file" in
                *.sh)
                  shellcheck "$file"
                  ;;
                *.fish)
                  fish -n "$file"
                  ;;
                Brewfile)
                  brew bundle check --file="$file" --no-upgrade
                  ;;
              esac
            fi
          done

  notify-sync:
    name: Sync Notification
    runs-on: ubuntu-latest
    needs: [validate-changes]
    if: github.event_name == 'push'

    steps:
      - name: Create sync reminder
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          {
            echo "# Dotfiles Sync Required"
            echo ""
            echo "Your dotfiles have been updated on GitHub."
            echo "Run the following on your machines to sync:"
            echo ""
            echo '```bash'
            echo 'cd ~/dotfiles'
            echo 'git pull'
            echo 'bash scripts/setup.sh'
            echo '```'
            echo ""
            echo "Commit: $COMMIT_SHA"
            echo "Author: $COMMIT_AUTHOR"
            printf "Message: %s\n" "$COMMIT_MESSAGE"
          } > sync-reminder.md

      - name: Upload reminder
        uses: actions/upload-artifact@v4
        with:
          name: sync-reminder
          path: sync-reminder.md
