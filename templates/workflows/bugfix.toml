[workflow]
name = "bugfix"
description = "Fix a bug or issue"
slash_command = "/ralph-wiggum:ralph-loop"
max_iterations = 50

[prompt]
template = """
You are fixing a bug: {title}

Bug description: {description}

Steps:
1. Reproduce the issue by reading relevant code and tests
2. Identify the root cause
3. Design the minimal fix that addresses the root cause
4. Implement the fix
5. Add a regression test
6. Run all related tests to verify the fix and no regressions
7. Create atomic commits with descriptive messages

When complete, output {completion_promise}

Do not ask questions - make reasonable decisions and iterate."""

[completion]
promise_prefix = "TICKET_"
auto_merge = true
create_pr = true
