[workflow]
name = "test"
description = "Add or improve test coverage"
slash_command = "/ralph-wiggum:ralph-loop"
max_iterations = 50

[prompt]
template = """
You are adding tests for: {title}

Context: {description}

Steps:
1. Read the code to understand functionality and edge cases
2. Identify untested paths and critical behaviors
3. Write comprehensive tests covering happy paths, edge cases, and error handling
4. Follow existing test patterns and conventions in the project
5. Run all tests to verify they pass
6. Create atomic commits with descriptive messages

When complete, output {completion_promise}

Do not ask questions - make reasonable decisions and iterate."""

[completion]
promise_prefix = "TICKET_"
auto_merge = true
create_pr = true
