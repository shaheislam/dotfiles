# Linux/WSL parity manifest for the CLI + agentic harness surface.
#
# category:
#   portable   Works unchanged on macOS, Linux, and WSL.
#   linux-alt  Needs a Linux/WSL-specific package name, source, or shim.
#   macos-only Accepted gap for Linux/WSL.
#   gap        Not supported yet; tracked intentionally.
# strategy:
#   native:<pkg>   Install via the distro package manager.
#   eget:<repo>    Install from a GitHub release with eget.
#   mise:<tool>    Install or manage via mise.
#   pipx:<pkg>     Install via pipx.
#   npm:<pkg>      Install via npm/bun tooling.
#   systemd-user   Linux/WSL daemon parity via systemd --user.
#   shim           Cross-OS wrapper required.
#   none           No Linux action required or accepted gap.
