# SonarQube Community Edition - Local Code Quality Analysis
# Runs SonarQube server via Colima + Docker for local code quality scanning
#
# Usage:
#   ./scripts/sonarqube/setup-sonarqube.sh start
#   Or manually: docker compose -f scripts/sonarqube/docker-compose.yml up -d
#
# Web UI: http://localhost:9000 (default credentials: admin/admin)

services:
  sonarqube:
    container_name: sonarqube
    image: sonarqube:lts-community
    restart: unless-stopped
    ports:
      - "${SONARQUBE_PORT:-9000}:9000"
    environment:
      # Embedded H2 database (suitable for personal use, no external DB needed)
      SONAR_JDBC_URL: ""
      # JVM memory settings (tuned for personal use on macOS)
      SONAR_CE_JAVAOPTS: "-Xmx512m -Xms128m"
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms128m"
      SONAR_SEARCH_JAVAOPTS: "-Xmx512m -Xms256m"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    # Required for Elasticsearch
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  sonarqube_data:
    name: sonarqube_data
  sonarqube_logs:
    name: sonarqube_logs
  sonarqube_extensions:
    name: sonarqube_extensions
