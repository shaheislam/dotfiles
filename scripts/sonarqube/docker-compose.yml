# SonarQube Community Edition - Local Code Quality Analysis
# Runs SonarQube CE server via Colima + Docker for local code quality scanning.
#
# All analysis features used by this integration (REST API for issues,
# quality gates, project status) are available in Community Edition.
# The custom AI analysis (--ai/--fix flags in Fish wrapper) is entirely
# external to SonarQube: it fetches issues via the CE REST API and pipes
# them to Claude CLI or local Ollama. No SonarQube AI plugins or higher
# editions are required.
#
# Data persistence: Named Docker volumes (sonarqube_data, sonarqube_logs,
# sonarqube_extensions) survive container stop/start and Colima reboots.
# Only 'docker compose down -v' or 'docker volume rm' deletes them.
# If Colima crashes, restart it and run 'docker compose up -d' to recover.
#
# Usage:
#   ./scripts/sonarqube/setup-sonarqube.sh start
#   Or manually: docker compose -f scripts/sonarqube/docker-compose.yml up -d
#
# Web UI: http://localhost:9000 (default credentials: admin/admin)

services:
  sonarqube:
    container_name: sonarqube
    image: sonarqube:lts-community
    restart: unless-stopped
    ports:
      - "${SONARQUBE_PORT:-9000}:9000"
    environment:
      # Embedded H2 database (suitable for personal/single-user use, no external DB needed)
      # Data is persisted in the sonarqube_data named volume below.
      SONAR_JDBC_URL: ""
      # JVM memory settings (tuned for personal use on macOS)
      SONAR_CE_JAVAOPTS: "-Xmx512m -Xms128m"
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms128m"
      SONAR_SEARCH_JAVAOPTS: "-Xmx512m -Xms256m"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    # Required for Elasticsearch
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  sonarqube_data:
    name: sonarqube_data
  sonarqube_logs:
    name: sonarqube_logs
  sonarqube_extensions:
    name: sonarqube_extensions
