# Enable mouse mode
set -g mouse on

# Set prefix to Ctrl-x
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Fix permissions for directory access
set -g default-command "reattach-to-user-namespace -l $SHELL"
set -g default-shell /opt/homebrew/bin/fish

# Increase scrollback buffer size
set -g history-limit 1000000

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows
set -g renumber-windows on

# Increase repeat time for repeatable commands
set -g repeat-time 1000

# Enable focus events
set -g focus-events on

# Enable true colors - FIXED TERMINAL SETTINGS
# Use tmux-256color since it's confirmed available
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:Tc'  # True color support for all terminals
set -ga terminal-overrides ',*:RGB' # RGB color support
set -ga terminal-overrides ',xterm-256color:Ms=\\E]52;c;%p2%s\\7' # OSC 52 clipboard support
set -ga terminal-overrides ',tmux-256color:Ms=\\E]52;c;%p2%s\\7'  # OSC 52 for tmux term
set -ga terminal-overrides ',*:Smulx=\\E[4::%p1%dm'  # Undercurl support
set -ga terminal-overrides ',*:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # Underscore colors

# Fix Home/End keys
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# Additional settings
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style

# Pane border styles
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Enable plugins
set -g @plugin 'tmux-plugins/tpm'
# IMPORTANT: Move tmux-sensible AFTER our terminal settings
# set -g @plugin 'tmux-plugins/tmux-sensible'  # We'll add this back later
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'lalitmee/tmux-which-key'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
# Load tmux-sensible LAST to avoid overriding our settings
# set -g @plugin 'tmux-plugins/tmux-sensible'

# FZF URL configuration
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="  " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Floax configuration
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'false'

# Sessionx configuration
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Continuum and resurrect configuration
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Theme configuration
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_left_separator "█"
set -g @catppuccin_window_right_separator "█"
set -g @catppuccin_window_middle_separator "█"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,( ),}"
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

# Status bar configuration
set -g status-position top
set -g status-interval 1
set -g status-style "fg=colour240,bg=colour234"

# Key bindings
# Use vim keybindings in copy mode
setw -g mode-keys vi

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like window navigation
bind -n M-h previous-window
bind -n M-l next-window

# Split windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Synchronize panes
bind y set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Reload tmux config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Which-key configuration
set -g @which-key-prefix 'prefix'
set -g @which-key-separator ' '
set -g @which-key-sort 'true'
set -g @which-key-desc-prefix ' '
set -g @which-key-desc-suffix ' '
set -g @which-key-aliases-prefix ' '
set -g @which-key-aliases-suffix ' '
set -g @which-key-style 'fg=colour240,bg=colour234'
set -g @which-key-position 'bottom'
set -g @which-key-format ' #{b} '

# FORCE terminal settings AFTER plugins to ensure they stick
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:Tc'
set -ga terminal-overrides ',*:RGB'
set -ga terminal-overrides ',xterm-256color:Ms=\\E]52;c;%p2%s\\7'
set -ga terminal-overrides ',tmux-256color:Ms=\\E]52;c;%p2%s\\7'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
