# Enable mouse mode
set -g mouse on

# Set prefix to Ctrl-x
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Increase scrollback buffer size
set -g history-limit 50000

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows
set -g renumber-windows on

# Increase repeat time for repeatable commands
set -g repeat-time 1000

# Enable focus events
set -g focus-events on

# Enable true colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Set fish as default shell
set -g default-shell /opt/homebrew/bin/fish
set -g default-command /opt/homebrew/bin/fish
set -g default-shell-command /opt/homebrew/bin/fish
set -g default-command-command /opt/homebrew/bin/fish

# Enable clipboard
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'lalitmee/tmux-which-key'

# Theme configuration
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_left_separator "█"
set -g @catppuccin_window_right_separator "█"
set -g @catppuccin_window_middle_separator "█"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "yes"

# Status bar configuration
set -g status-position top
set -g status-interval 1
set -g status-style "fg=colour240,bg=colour234"

# Key bindings
# Use vim keybindings in copy mode
setw -g mode-keys vi

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like window navigation
bind -n M-h previous-window
bind -n M-l next-window

# Split windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Synchronize panes
bind y set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Reload tmux config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Which-key configuration
set -g @which-key-prefix 'prefix'
set -g @which-key-separator ' '
set -g @which-key-sort 'true'
set -g @which-key-desc-prefix ' '
set -g @which-key-desc-suffix ' '
set -g @which-key-aliases-prefix ' '
set -g @which-key-aliases-suffix ' '
set -g @which-key-style 'fg=colour240,bg=colour234'
set -g @which-key-position 'bottom'
set -g @which-key-format ' #{b} '

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
